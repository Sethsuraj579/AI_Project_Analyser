name: CI — Lint, Test, Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
  DJANGO_DEBUG: "True"
  DATABASE_URL: "sqlite:///ci-test.sqlite3"
  REDIS_URL: "redis://localhost:6379/0"
  SENTRY_DSN: ""

jobs:
  # ──────────────────────────────────────────────────
  # Backend: lint + test
  # ──────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run migrations
        run: |
          cd backend
          python manage.py migrate --noinput

      - name: Run tests with coverage
        run: |
          cd backend
          pytest --cov=analyser --cov-report=xml --cov-report=term -v

      - name: Security scan with Bandit
        run: |
          cd backend
          bandit -r analyser/ -f json -o bandit-report.json || true
          cat bandit-report.json

      - name: Dependency check with Safety
        run: |
          cd backend
          safety check --file requirements.txt || true

  # ──────────────────────────────────────────────────
  # Frontend: lint + build
  # ──────────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build

  # ──────────────────────────────────────────────────
  # Docker build check
  # ──────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build --target backend -t analyser-backend .

      - name: Build frontend Docker image
        run: docker build --target frontend -t analyser-frontend .
