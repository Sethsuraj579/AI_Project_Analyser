name: CI — Lint, Test, Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────
  # Backend: lint + test
  # ──────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-insecure-test-key-only
      DJANGO_DEBUG: "True"
      DJANGO_SETTINGS_MODULE: project_analyser.test_settings
      DATABASE_URL: sqlite:///test.sqlite3
      REDIS_URL: redis://localhost:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run migrations
        run: |
          cd backend
          python manage.py migrate --noinput --settings=project_analyser.test_settings

      - name: Run tests with coverage
        run: |
          cd backend
          pytest --cov=analyser --cov-report=xml --cov-report=term -v --ds=project_analyser.test_settings

      - name: Security scan with Bandit
        continue-on-error: true
        run: |
          cd backend
          bandit -r analyser/ -f json -o bandit-report.json
          cat bandit-report.json

      - name: Dependency check with Safety
        continue-on-error: true
        run: |
          cd backend
          safety check --file requirements.txt

  # ──────────────────────────────────────────────────
  # Frontend: lint + build
  # ──────────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build

  # ──────────────────────────────────────────────────
  # Docker build check
  # ──────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build --target backend -t analyser-backend .

      - name: Build frontend Docker image
        run: docker build --target frontend -t analyser-frontend .

  # ──────────────────────────────────────────────────
  # CD: publish images to GitHub Container Registry
  # ──────────────────────────────────────────────────
  publish-images:
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Normalize repository owner (lowercase)
        id: vars
        shell: bash
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: backend
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/ai-project-analyser-backend:latest
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/ai-project-analyser-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: frontend
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/ai-project-analyser-frontend:latest
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/ai-project-analyser-frontend:${{ github.sha }}
